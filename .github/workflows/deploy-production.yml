name: Deploy production site

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: production-pages
  cancel-in-progress: true

jobs:
  deploy-production:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm ci --silent
          npm install --no-save sharp

      - name: Validate source and season data
        run: |
          npm run typecheck
          npm run validate:data

      - name: Optimize website images
        run: npm run optimize:images

      - name: Build production site
        env:
          VITE_USE_OPTIMIZED_IMAGES: "true"
          VITE_ANALYTICS_DISABLED: "false"
          VITE_GA_MEASUREMENT_ID: "G-XQBVK88M6K"
        run: npx vite build --base=/d-league/

      - name: Publish production site
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          keep_files: true
          force_orphan: false
          commit_message: "deploy: publish production site"
