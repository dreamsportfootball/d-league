name: Export season data

on:
  push:
    branches:
      - season/2026-27

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --silent

      - name: Generate season files
        run: node scripts/export-legacy-data.mjs season-export

      - name: Upload generated files
        uses: actions/upload-artifact@v4
        with:
          name: season-data-export
          path: season-export
