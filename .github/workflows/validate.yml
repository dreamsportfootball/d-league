name: Validate D LEAGUE website

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - season/2026-27

jobs:
  typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --silent

      - name: Type-check
        id: typecheck
        continue-on-error: true
        run: node scripts/run-typecheck.mjs

      - name: Upload typecheck report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-report
          path: typecheck.log

      - name: Fail when typecheck fails
        if: steps.typecheck.outcome == 'failure'
        run: exit 1

  build:
    runs-on: ubuntu-latest
    needs: typecheck

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm ci --silent
          npm install --no-save sharp

      - name: Validate season data
        run: npm run validate:data

      - name: Optimize website images
        run: npm run optimize:images

      - name: Build website
        env:
          VITE_USE_OPTIMIZED_IMAGES: "true"
        run: npx vite build

  visual-audit:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm ci --silent
          npm install --no-save playwright sharp

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Optimize website images
        run: npm run optimize:images

      - name: Build preview-mode site
        env:
          VITE_ROUTER_MODE: hash
          VITE_USE_PREVIEW_DATA: "true"
          VITE_USE_OPTIMIZED_IMAGES: "true"
        run: npx vite build

      - name: Start local preview server
        run: |
          nohup npx vite preview --host 127.0.0.1 --port 4173 > /tmp/d-league-preview.log 2>&1 &
          for attempt in {1..30}; do
            if curl --silent --fail http://127.0.0.1:4173/d-league/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/d-league-preview.log
          exit 1

      - name: Capture responsive screenshots and diagnostics
        env:
          AUDIT_BASE_URL: http://127.0.0.1:4173/d-league
        run: node scripts/visual-audit.mjs

      - name: Validate Lunar New Year Cup behavior
        env:
          AUDIT_BASE_URL: http://127.0.0.1:4173/d-league
        run: node scripts/validate-cup-page.mjs

      - name: Validate optimized image delivery
        env:
          AUDIT_BASE_URL: http://127.0.0.1:4173/d-league
        run: node scripts/validate-image-performance.mjs

      - name: Validate registration progress
        env:
          AUDIT_BASE_URL: http://127.0.0.1:4173/d-league
        run: node scripts/validate-registration-progress.mjs

      - name: Upload visual audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: responsive-visual-audit
          path: |
            visual-audit
            image-optimization-report.json
          if-no-files-found: error
          retention-days: 14
