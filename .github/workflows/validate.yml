name: Validate D LEAGUE website

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - season/2026-27

jobs:
  typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --silent

      - name: Type-check
        id: typecheck
        continue-on-error: true
        run: node scripts/run-typecheck.mjs

      - name: Upload typecheck report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-report
          path: typecheck.log

      - name: Fail when typecheck fails
        if: steps.typecheck.outcome == 'failure'
        run: exit 1

  build:
    runs-on: ubuntu-latest
    needs: typecheck

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --silent

      - name: Build website
        run: npx vite build
